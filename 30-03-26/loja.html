<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Gerenciador Produtos</title>
        <!-- Importando Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <!-- Importando Axios para fazer requisições http -->
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <script src="config.js"></script>
    </head>
    <body class="bg-light">
        <!-- Classe container responsavel por definir o display como flex -->
        <div class="container mt-3">
            <!-- Formulario -->
            <div class="card shadow mb-3">
                <div class="card-body">
                    <h3 class="card-title mb-3">Criar Produto</h3>
                    <form id="formulario">
                        <div class="mb-3">
                            <label class="form-label">
                                Nome Produto
                            </label>
                            <input 
                            type="text" 
                            id="nome" 
                            class="form-control" 
                            required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">
                                Preço
                            </label>
                            <input 
                            type="number" 
                            id="preco" 
                            class="form-control" 
                            required>
                        </div>
                            <div class="mb-3">
                            <label class="form-label">
                                Quantidade
                            </label>
                            <input 
                            type="number" 
                            id="quantidade" 
                            class="form-control" 
                            required>
                        </div>
                        <button id="botao_submit" type="submit" class="btn btn-primary">
                            Criar Produto
                        </button>
                    </form>
                    <div id="resultado" class="mt-3"></div>
                </div>
            </div>
            <!-- Listagem -->
            <div class="card shadow">
                <div class="card-body">
                    <h3 class="card-title mb-3">Listagem</h3>
                    <table class="table table-bordered table-striped">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Preço</th>
                                <th>Quantidade</th>
                                <th>ID</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="corpo_tabela">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </body>
</html>
<script>
    const BASE_URL = `https://api.restful-api.dev/collections/${CONFIG.COLLECTION}/objects`
    console.log(BASE_URL)
    // Criando cliente do axios, ja configurado
    const api = axios.create({
        baseURL: BASE_URL,
        headers: {
            "x-api-key": CONFIG.TOKEN,
            "Content-Type": "application/json"
        }
    })

    let formulario = document.getElementById("formulario")
    let alerta =  document.getElementById("resultado")
    let botao = document.getElementById("botao_submit")
    editandoId = null
    
    alerta.innerHTML = ""

    formulario.addEventListener("submit", async function(e) {
        e.preventDefault()
        console.log("Formulario enviado")

        let nome = document.getElementById("nome").value
        let preco = document.getElementById("preco").value
        let quantidade = document.getElementById("quantidade").value

        let corpo = {
            name: nome,
            data: {
                price: preco,
                quantity: quantidade
            }
        }
        try {
            if (editandoId) {
                // Edicao produto
                let resposta = await api.put(editandoId, corpo)
              
                console.log(resposta)
                alerta.innerHTML = 
                    `<div class="alert alert-success">
                        Produto Editado com sucesso! ID: <code>${editandoId}</code>
                    </div>`
                editandoId = null

            } else {
                //Criacao do produto
                let resposta = await api.post("", corpo)
                console.log(resposta)
                alerta.innerHTML = 
                    `<div class="alert alert-success">
                        Produto Criado! ID: <code>${resposta.data.id}</code>
                    </div>`
                console.log(resposta)
            }  
            
            document.getElementById("formulario").reset()

            botao.textContent = "Criar Produto"
            botao.classList.remove("btn-warning")
            botao.classList.add("btn-primary")
            carregarProdutos()
          
        } catch (erro) {
            alerta.innerHTML = 
                `<div class="alert alert-danger">
                    Erro: ${erro.response?.data || "Falha ao exibir a mensagem"}
                </div>`
        }

    })


    async function carregarProdutos() {
        let corpo_tabela = document.getElementById("corpo_tabela")

        corpo_tabela.innerHTML = ""

        try {    
            let resposta = await api.get("")
            console.log(resposta.data)
            let produtos = resposta.data
            produtos.forEach(produto => {
                let linha = `
                    <tr>
                        <td>${produto.name}</td>
                        <td>${produto.data.price}</td>
                        <td>${produto.data.quantity}</td>
                        <td><code>${produto.id}</code></td>
                        <td>
                            <button class="btn btn-sm btn-warning"
                            onclick='editarProduto(${JSON.stringify(produto)})'
                            >
                                Editar
                            </button>
                            <button class="btn btn-sm btn-danger"
                                onclick="excluirProduto('${produto.id}')"
                            >
                                Excluir
                            </button>
                        </td>
                    <tr>
                `
               
                 corpo_tabela.insertAdjacentHTML("beforeend", linha)
            })

        } catch(erro) {
            alerta.innerHTML = 
                `<div class="alert alert-danger">
                    Erro: ${erro.response?.data || "Falha ao exibir a mensagem"}
                </div>`
        }

    }

    async function excluirProduto(id) {
        if (!confirm("Tem certeza que deseja excluir o produto?")) return

        try {
            await api.delete(id)
            alerta.innerHTML = 
            `<div class="alert alert-success">
                Produto Excluido com sucesso!</code>
            </div>`
            carregarProdutos()
        } catch(erro) {
             alerta.innerHTML = 
                `<div class="alert alert-danger">
                    Erro: ${erro || "Falha ao exibir a mensagem"}
                </div>`
        }

    }

    async function editarProduto(produto) {
        console.log("Editar")
        console.log(produto.name)
        document.getElementById("nome").value = produto.name
        document.getElementById("preco").value = produto.data.price
        document.getElementById("quantidade").value = produto.data.quantity

        botao.textContent = "Editar Produto"
        botao.classList.remove("btn-primary")
        botao.classList.add("btn-warning")

        editandoId = produto.id
        // Comando para mover a tela para o topo com uma transicao suave
        window.scrollTo({top: 0, behavior: "smooth"})



    }


    carregarProdutos()

</script>
